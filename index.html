<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Italian Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#4a3423;
    --ink-soft:#8a6d4f;
    --paper:#fdf3d9;
    --card:#fffaea;
    --wood:#8a5a34;
    --wood-dark:#5c3a1e;
    --leaf:#7cb342;
    --leaf-dark:#558b2f;
    --sky:#bfe3f0;
    --good:#3f7d3a;
    --good-bg:#e3f3d8;
    --bad:#b5482f;
    --bad-bg:#fbe3da;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 20% 15%, #e7f5c9 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, #cdeab3 0%, transparent 40%),
      var(--sky);
    color:var(--ink);
    font-family:'VT323', ui-monospace, monospace;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:20px;
  }

  .frame{
    background:var(--wood-dark);
    padding:8px;
    width:100%;
    max-width:460px;
    clip-path: polygon(
      0 14px, 14px 14px, 14px 0,
      calc(100% - 14px) 0, calc(100% - 14px) 14px, 100% 14px,
      100% calc(100% - 14px), calc(100% - 14px) calc(100% - 14px), calc(100% - 14px) 100%,
      14px 100%, 14px calc(100% - 14px), 0 calc(100% - 14px)
    );
  }
  .card{
    background:var(--wood);
    padding:6px;
    clip-path: polygon(
      0 12px, 12px 12px, 12px 0,
      calc(100% - 12px) 0, calc(100% - 12px) 12px, 100% 12px,
      100% calc(100% - 12px), calc(100% - 12px) calc(100% - 12px), calc(100% - 12px) 100%,
      12px 100%, 12px calc(100% - 12px), 0 calc(100% - 12px)
    );
  }
  .inner{
    background:var(--card);
    padding:26px 22px 22px;
    clip-path: polygon(
      0 10px, 10px 10px, 10px 0,
      calc(100% - 10px) 0, calc(100% - 10px) 10px, 100% 10px,
      100% calc(100% - 10px), calc(100% - 10px) calc(100% - 10px), calc(100% - 10px) 100%,
      10px 100%, 10px calc(100% - 10px), 0 calc(100% - 10px)
    );
  }

  h1{
    font-family:'Press Start 2P', 'VT323', monospace;
    font-size:22px;
    line-height:1.6;
    text-align:center;
    color:var(--ink);
    margin:2px 0 2px;
  }
  .subtitle{
    text-align:center;
    font-size:17px;
    color:var(--ink-soft);
    margin:0 0 16px;
  }

  .reload-row{
    display:flex;
    justify-content:center;
    margin-bottom:14px;
  }
  .reload-btn{
    font-family:'VT323', monospace;
    font-size:17px;
    font-weight:700;
    color:#fff;
    background:var(--leaf);
    border:3px solid var(--leaf-dark);
    padding:8px 18px;
    cursor:pointer;
    clip-path: polygon(0 6px, 6px 6px, 6px 0, calc(100% - 6px) 0, calc(100% - 6px) 6px, 100% 6px, 100% calc(100% - 6px), calc(100% - 6px) calc(100% - 6px), calc(100% - 6px) 100%, 6px 100%, 6px calc(100% - 6px), 0 calc(100% - 6px));
  }
  .reload-btn:active{background:var(--leaf-dark);}

  /* mode select screen */
  .mode-select{display:none;}
  .mode-select.show{display:block;}
  .mode-select .label{
    text-align:center;
    font-size:16px;
    margin-bottom:14px;
  }
  .mode-select .label::before{content:"";}
  .mode-btn{
    font-family:'VT323', monospace;
    text-align:center;
    line-height:1.5;
  }
  .mode-sub{
    font-size:14px;
    opacity:0.85;
  }

  .status-msg{
    text-align:center;
    color:var(--ink-soft);
    font-size:18px;
    padding:26px 8px;
    line-height:1.5;
  }
  .status-msg code{
    background:var(--paper);
    padding:2px 6px;
    border:2px solid var(--wood);
  }
  .error-msg{
    background:var(--bad-bg);
    color:var(--bad);
    border:2px solid var(--bad);
    padding:10px 12px;
    font-size:16px;
    margin-bottom:14px;
    display:none;
    text-align:center;
  }
  .error-msg.show{display:block;}

  .quiz-body{display:none;}
  .quiz-body.show{display:block;}

  .quiz-top-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
    gap:10px;
  }
  .quiz-top-row .progress{margin-bottom:0; text-align:left;}
  .change-mode-btn{
    font-family:'VT323', monospace;
    font-size:14px;
    font-weight:700;
    color:var(--ink-soft);
    background:var(--paper);
    border:2px solid var(--wood);
    padding:6px 10px;
    cursor:pointer;
    white-space:nowrap;
    clip-path: polygon(0 5px, 5px 5px, 5px 0, calc(100% - 5px) 0, calc(100% - 5px) 5px, 100% 5px, 100% calc(100% - 5px), calc(100% - 5px) calc(100% - 5px), calc(100% - 5px) 100%, 5px 100%, 5px calc(100% - 5px), 0 calc(100% - 5px));
  }

  .progress{
    font-size:18px;
    font-weight:700;
    color:var(--ink-soft);
    margin-bottom:18px;
    text-align:center;
  }
  .label{
    font-size:14px;
    font-weight:700;
    letter-spacing:0.06em;
    color:var(--leaf-dark);
    margin-bottom:4px;
    text-align:center;
  }
  .label::before{content:"🌿 ";}
  .prompt-block{margin-bottom:18px; text-align:center;}
  .english-word{
    font-size:28px;
    font-weight:700;
    line-height:1.25;
    color:var(--ink);
  }
  .italian-block{margin-bottom:18px; text-align:center;}
  .article{
    font-size:19px;
    font-weight:700;
    color:var(--ink-soft);
    margin-bottom:2px;
  }
  .masked-word{
    font-size:34px;
    font-weight:700;
    letter-spacing:0.06em;
    color:var(--ink);
    word-break:break-word;
  }
  input[type="text"]{
    width:100%;
    font-family:'VT323', monospace;
    font-size:22px;
    padding:14px 14px;
    border:3px solid var(--wood);
    background:var(--paper);
    color:var(--ink);
    margin-bottom:14px;
    outline:none;
    text-align:center;
    clip-path: polygon(0 6px, 6px 6px, 6px 0, calc(100% - 6px) 0, calc(100% - 6px) 6px, 100% 6px, 100% calc(100% - 6px), calc(100% - 6px) calc(100% - 6px), calc(100% - 6px) 100%, 6px 100%, 6px calc(100% - 6px), 0 calc(100% - 6px));
  }
  input[type="text"]:focus{border-color:var(--leaf-dark);}
  .btn{
    width:100%;
    display:block;
    font-family:'VT323', monospace;
    font-size:22px;
    font-weight:700;
    padding:13px 18px;
    border:3px solid var(--leaf-dark);
    margin-bottom:12px;
    cursor:pointer;
    color:#fff;
    background:var(--leaf);
    clip-path: polygon(0 6px, 6px 6px, 6px 0, calc(100% - 6px) 0, calc(100% - 6px) 6px, 100% 6px, 100% calc(100% - 6px), calc(100% - 6px) calc(100% - 6px), calc(100% - 6px) 100%, 6px 100%, 6px calc(100% - 6px), 0 calc(100% - 6px));
  }
  .btn:active{background:var(--leaf-dark);}
  .btn-row{display:flex; gap:12px;}
  .btn-row .btn{margin-bottom:0;}
  .feedback{
    border:3px solid var(--good);
    padding:12px 14px;
    margin-bottom:14px;
    font-size:20px;
    font-weight:700;
    text-align:center;
    display:none;
    clip-path: polygon(0 6px, 6px 6px, 6px 0, calc(100% - 6px) 0, calc(100% - 6px) 6px, 100% 6px, 100% calc(100% - 6px), calc(100% - 6px) calc(100% - 6px), calc(100% - 6px) 100%, 6px 100%, 6px calc(100% - 6px), 0 calc(100% - 6px));
  }
  .feedback.show{display:block;}
  .feedback.correct{background:var(--good-bg); color:var(--good); border-color:var(--good);}
  .feedback.incorrect{background:var(--bad-bg); color:var(--bad); border-color:var(--bad);}
  .feedback .answer{
    display:block;
    margin-top:4px;
    font-size:22px;
    font-weight:700;
  }
  .hidden{display:none !important;}
</style>
</head>
<body>

<div class="frame"><div class="card"><div class="inner">

  <h1>BENVENUTI</h1>
  <div class="subtitle">🌻 grow your vocabulary, one word at a time 🌻</div>

  <div class="reload-row">
    <button class="reload-btn" id="reloadBtn">🔄 Reload List</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="status-msg" id="statusMsg">Loading your list...</div>

  <div class="mode-select" id="modeSelect">
    <div class="label" id="modeSelectLabel">Choose a mode</div>
    <button class="btn mode-btn" id="modeNormalBtn">🌱 Normal<br><span class="mode-sub">English → Italian</span></button>
    <button class="btn mode-btn" id="modeReverseBtn">🔄 Reverse<br><span class="mode-sub">Italian → English</span></button>
    <button class="btn mode-btn" id="modeBlindBtn">🙈 Blind<br><span class="mode-sub">No starting letters</span></button>
  </div>

  <div class="quiz-body" id="quizBody">
    <div class="quiz-top-row">
      <div class="progress" id="progress">0 / 0</div>
      <button class="change-mode-btn" id="changeModeBtn">Change Mode</button>
    </div>

    <div class="prompt-block">
      <div class="label" id="promptLabel">English</div>
      <div class="english-word" id="promptText"></div>
    </div>

    <div class="italian-block">
      <div class="label" id="answerLabel">Italian</div>
      <div class="article" id="articleText"></div>
      <div class="masked-word" id="maskedWord"></div>
    </div>

    <div class="feedback" id="feedback">
      <span id="feedbackTitle"></span>
      <span class="answer hidden" id="feedbackAnswer"></span>
    </div>

    <input type="text" id="answerInput" placeholder="Type the Italian word" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">

    <button class="btn" id="checkBtn">Check</button>
    <div class="btn-row">
      <button class="btn" id="hintBtn">Hint</button>
      <button class="btn" id="nextBtn">Next</button>
    </div>
  </div>

</div></div></div>

<script>
(function(){
  "use strict";

  // =========================================================================
  // PASTE YOUR GOOGLE SHEET CSV LINK HERE
  // How to get it: In Google Sheets, go to File > Share > Publish to web,
  // choose the correct sheet/tab, set format to "Comma-separated values (.csv)",
  // click Publish, then copy the link it gives you and paste it below.
  // =========================================================================
  var SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQZbU5WJpoFAVCv_W2dY0KlGORct6tg90tDX2u6E209x4NK4r5LgGwZVESsfQzaWASWBopYKiE6kY6k/pub?gid=1667081684&single=true&output=csv";
  // =========================================================================

  var ARTICLES = ["il","lo","la","i","gli","le","un","uno","una"];
  var LETTER_RE = /[a-zA-Zàèéìòùáéíóúü]/;
  // Leitner-style boxes: how many cards ahead a word gets requeued.
  // Box 0 = just missed, comes back soon. Box 4 = mastered, comes back much later.
  var GAPS = [4, 8, 15, 25, 40];
  var MASTER_BOX = GAPS.length - 1;

  var settings = {
    reverse: false,
    blind: false
  };

  var state = {
    words: [],
    order: [],
    currentIndex: null,
    revealed: [],
    answered: false,
    scheduledThisTurn: false
  };
  var seenCount = 0;

  var errorMsg = document.getElementById('errorMsg');
  var statusMsg = document.getElementById('statusMsg');
  var modeSelect = document.getElementById('modeSelect');
  var quizBody = document.getElementById('quizBody');
  var reloadBtn = document.getElementById('reloadBtn');
  var modeNormalBtn = document.getElementById('modeNormalBtn');
  var modeReverseBtn = document.getElementById('modeReverseBtn');
  var modeBlindBtn = document.getElementById('modeBlindBtn');
  var changeModeBtn = document.getElementById('changeModeBtn');

  var progressEl = document.getElementById('progress');
  var promptLabel = document.getElementById('promptLabel');
  var promptText = document.getElementById('promptText');
  var answerLabel = document.getElementById('answerLabel');
  var articleTextEl = document.getElementById('articleText');
  var maskedWordEl = document.getElementById('maskedWord');
  var answerInput = document.getElementById('answerInput');
  var feedback = document.getElementById('feedback');
  var feedbackTitle = document.getElementById('feedbackTitle');
  var feedbackAnswer = document.getElementById('feedbackAnswer');
  var checkBtn = document.getElementById('checkBtn');
  var hintBtn = document.getElementById('hintBtn');
  var nextBtn = document.getElementById('nextBtn');

  // ---------- Loading from Google Sheet ----------
  function loadFromSheet(){
    hideError();
    quizBody.classList.remove('show');
    modeSelect.classList.remove('show');
    statusMsg.classList.remove('hidden');

    if(!SHEET_CSV_URL || SHEET_CSV_URL.indexOf('PASTE_YOUR') !== -1){
      statusMsg.innerHTML = 'Add your Google Sheet CSV link to <code>SHEET_CSV_URL</code> near the top of the &lt;script&gt; tag, then reload the page.';
      return;
    }

    statusMsg.textContent = 'Loading your list...';
    var bustUrl = SHEET_CSV_URL + (SHEET_CSV_URL.indexOf('?') === -1 ? '?' : '&') + '_ts=' + Date.now();

    fetch(bustUrl)
      .then(function(res){
        if(!res.ok) throw new Error('Request failed with status ' + res.status);
        return res.text();
      })
      .then(function(text){
        var delimiter = detectDelimiter(text);
        var rows = parseDelimited(text, delimiter);
        var words = buildWordList(rows);
        if(words.length === 0){
          showError("Connected, but found no usable rows. Check the sheet has a Term/Front column and a Definition/Back column.");
          statusMsg.textContent = '';
          return;
        }
        state.words = words;
        statusMsg.classList.add('hidden');
        modeSelect.classList.add('show');
      })
      .catch(function(err){
        showError("Could not load the sheet. Make sure it's published to the web as CSV and the link is correct.");
        statusMsg.textContent = '';
      });
  }

  reloadBtn.addEventListener('click', loadFromSheet);

  function showError(msg){
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
  }
  function hideError(){
    errorMsg.classList.remove('show');
  }

  // ---------- Mode selection screen ----------
  function chooseMode(reverse, blind){
    settings.reverse = reverse;
    settings.blind = blind;
    modeSelect.classList.remove('show');
    startSession();
  }
  modeNormalBtn.addEventListener('click', function(){ chooseMode(false, false); });
  modeReverseBtn.addEventListener('click', function(){ chooseMode(true, false); });
  modeBlindBtn.addEventListener('click', function(){ chooseMode(false, true); });

  changeModeBtn.addEventListener('click', function(){
    quizBody.classList.remove('show');
    modeSelect.classList.add('show');
  });

  // ---------- Delimiter detection ----------
  // Quizlet's "export" is comma-separated when downloaded as .csv, but a
  // plain copy/paste export is tab-separated. Pick whichever delimiter
  // shows up consistently outside quotes on the first non-empty line.
  function detectDelimiter(text){
    var firstLine = text.split(/\r?\n/).find(function(l){ return l.trim().length > 0; }) || '';
    var commaCount = (firstLine.match(/,/g) || []).length;
    var tabCount = (firstLine.match(/\t/g) || []).length;
    return tabCount > commaCount ? '\t' : ',';
  }

  // ---------- Delimited text parsing (comma or tab, with quote support) ----------
  function parseDelimited(text, delimiter){
    text = text.replace(/^\uFEFF/, ''); // strip BOM
    var rows = [];
    var row = [];
    var field = '';
    var inQuotes = false;
    for(var i=0; i<text.length; i++){
      var c = text[i];
      if(inQuotes){
        if(c === '"'){
          if(text[i+1] === '"'){ field += '"'; i++; }
          else{ inQuotes = false; }
        } else {
          field += c;
        }
      } else {
        if(c === '"'){
          inQuotes = true;
        } else if(c === delimiter){
          row.push(field); field = '';
        } else if(c === '\r'){
          // skip, handle on \n
        } else if(c === '\n'){
          row.push(field); field = '';
          rows.push(row); row = [];
        } else {
          field += c;
        }
      }
    }
    if(field.length > 0 || row.length > 0){
      row.push(field);
      rows.push(row);
    }
    rows = rows.filter(function(r){
      return r.some(function(v){ return v && v.trim().length > 0; });
    });
    return rows;
  }

  function buildWordList(rows){
    if(rows.length === 0) return [];
    var startIdx = 0;
    var header = rows[0].map(function(h){ return (h||'').trim().toLowerCase(); });
    var termCol = 0, defCol = 1;
    var looksLikeHeader = header.some(function(h){
      return h.indexOf('term') !== -1 || h.indexOf('front') !== -1 || h.indexOf('definition') !== -1 || h.indexOf('back') !== -1;
    });
    if(looksLikeHeader){
      startIdx = 1;
      var tIdx = header.findIndex(function(h){ return h.indexOf('term') !== -1 || h.indexOf('front') !== -1; });
      var dIdx = header.findIndex(function(h){ return h.indexOf('definition') !== -1 || h.indexOf('back') !== -1; });
      if(tIdx !== -1) termCol = tIdx;
      if(dIdx !== -1) defCol = dIdx;
    }
    var out = [];
    for(var i=startIdx; i<rows.length; i++){
      var r = rows[i];
      if(!r || r.length < 2) continue;
      var termRaw = (r[termCol] || '').trim();
      var defRaw = (r[defCol] || '').trim();
      if(!termRaw || !defRaw) continue;
      var parsed = splitArticle(termRaw);
      out.push({
        article: parsed.article,
        noun: parsed.noun,
        full: termRaw,
        english: defRaw,
        box: 0
      });
    }
    return out;
  }

  function normalizeApostrophe(s){
    return s.replace(/[\u2018\u2019\u02BC\u00B4`]/g, "'");
  }

  function splitArticle(term){
    var t = normalizeApostrophe(term.trim());
    var apostropheMatch = t.match(/^([A-Za-z]{1,3}')(.+)$/);
    if(apostropheMatch){
      var artCandidate = apostropheMatch[1].toLowerCase();
      if(artCandidate === "l'" || artCandidate === "un'"){
        return { article: artCandidate, noun: apostropheMatch[2].trim() };
      }
    }
    var spaceIdx = t.indexOf(' ');
    if(spaceIdx !== -1){
      var firstWord = t.substring(0, spaceIdx).toLowerCase();
      if(ARTICLES.indexOf(firstWord) !== -1){
        return { article: firstWord, noun: t.substring(spaceIdx + 1).trim() };
      }
    }
    return { article: '', noun: t };
  }

  function buildItalianFull(w){
    if(!w.article) return w.noun;
    return w.article + (w.article.endsWith("'") ? '' : ' ') + w.noun;
  }

  // ---------- Session ----------
  function startSession(){
    quizBody.classList.add('show');
    seenCount = 0;
    state.order = shuffledIndices(state.words.length);
    state.currentIndex = null;
    nextWord();
  }

  function shuffledIndices(n){
    var arr = [];
    for(var i=0;i<n;i++) arr.push(i);
    for(var i=arr.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1));
      var tmp = arr[i]; arr[i]=arr[j]; arr[j]=tmp;
    }
    return arr;
  }

  // Reinsert the current word into the queue, spaced out by its box level.
  // correct === true  -> box goes up, comes back much later
  // correct === false -> box resets to 0, comes back soon
  // correct === null  -> skipped without answering, box unchanged
  function scheduleCurrent(correct){
    if(state.currentIndex === null) return;
    var idx = state.currentIndex;
    var w = state.words[idx];
    if(correct === true){ w.box = Math.min(w.box + 1, MASTER_BOX); }
    else if(correct === false){ w.box = 0; }
    var baseGap = GAPS[Math.min(w.box, GAPS.length - 1)];
    // Jitter the gap by up to +/-30% so repeats don't land on a predictable rhythm.
    var jitter = Math.round(baseGap * (Math.random() * 0.6 - 0.3));
    var gap = Math.max(2, baseGap + jitter);
    var insertPos = Math.min(gap, state.order.length);
    state.order.splice(insertPos, 0, idx);
  }

  function nextWord(){
    if(!state.scheduledThisTurn){
      scheduleCurrent(null);
    }
    state.scheduledThisTurn = false;

    if(state.order.length === 0){
      state.order = shuffledIndices(state.words.length);
    }
    state.currentIndex = state.order.shift();
    seenCount++;

    setupRevealForCurrentWord();
    state.answered = false;

    render();
  }

  function currentTargetString(w){
    return settings.reverse ? w.english : w.noun;
  }

  function setupRevealForCurrentWord(){
    var w = state.words[state.currentIndex];
    var target = currentTargetString(w);
    var letterPositions = [];
    for(var i=0;i<target.length;i++){
      if(LETTER_RE.test(target[i])) letterPositions.push(i);
    }
    var revealCount;
    if(settings.blind){
      revealCount = 0;
    } else {
      revealCount = Math.round(letterPositions.length * (0.10 + Math.random()*0.10));
      revealCount = Math.max(letterPositions.length > 0 ? 1 : 0, revealCount);
      revealCount = Math.min(revealCount, letterPositions.length);
    }
    var shuffledPositions = letterPositions.slice();
    for(var i=shuffledPositions.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1));
      var tmp = shuffledPositions[i]; shuffledPositions[i]=shuffledPositions[j]; shuffledPositions[j]=tmp;
    }
    var revealSet = {};
    for(var i=0;i<revealCount;i++){ revealSet[shuffledPositions[i]] = true; }

    state.revealed = [];
    for(var i=0;i<target.length;i++){
      state.revealed.push(!!revealSet[i]);
    }
  }

  function reinitCurrentWord(){
    if(state.currentIndex === null) return;
    setupRevealForCurrentWord();
    state.answered = false;
    render();
  }

  function masteredCount(){
    var n = 0;
    for(var i=0;i<state.words.length;i++){
      if(state.words[i].box >= MASTER_BOX) n++;
    }
    return n;
  }

  function render(){
    var w = state.words[state.currentIndex];
    progressEl.textContent = "Card " + seenCount + " · Mastered " + masteredCount() + " / " + state.words.length;

    if(settings.reverse){
      promptLabel.textContent = "Italian";
      promptText.textContent = buildItalianFull(w);
      answerLabel.textContent = "English";
      articleTextEl.style.display = 'none';
      maskedWordEl.textContent = maskString(w.english, state.revealed);
      answerInput.placeholder = "Type the English word";
    } else {
      promptLabel.textContent = "English";
      promptText.textContent = w.english;
      answerLabel.textContent = "Italian";
      articleTextEl.style.display = w.article ? 'block' : 'none';
      articleTextEl.textContent = w.article ? w.article : '';
      maskedWordEl.textContent = maskString(w.noun, state.revealed);
      answerInput.placeholder = "Type the Italian word";
    }

    answerInput.value = '';
    feedback.classList.remove('show','correct','incorrect');
    feedbackAnswer.classList.add('hidden');
    answerInput.disabled = false;
    answerInput.focus();
  }

  function maskString(str, revealed){
    var out = '';
    for(var i=0;i<str.length;i++){
      var ch = str[i];
      if(!LETTER_RE.test(ch)){
        out += ch;
      } else if(revealed[i]){
        out += ch;
      } else {
        out += '*';
      }
    }
    return out;
  }

  function normalizeAnswer(s){
    return normalizeApostrophe(s)
      .toLowerCase()
      .trim()
      .replace(/\s+/g, ' ');
  }

  function englishAlternatives(englishText){
    return englishText.split(/\s*(?:\/|,|;| or )\s*/i)
      .map(function(a){ return normalizeAnswer(a).replace(/[.!?]+$/, ''); })
      .filter(function(a){ return a.length > 0; });
  }

  function checkAnswer(){
    if(state.answered) return;
    var w = state.words[state.currentIndex];
    var userVal = normalizeAnswer(answerInput.value);
    var isCorrect, displayAnswer;

    if(settings.reverse){
      var alts = englishAlternatives(w.english);
      isCorrect = alts.indexOf(userVal.replace(/[.!?]+$/, '')) !== -1;
      displayAnswer = w.english;
    } else {
      var expectedVal = normalizeAnswer(buildItalianFull(w));
      isCorrect = (userVal === expectedVal);
      displayAnswer = expectedVal;
    }

    state.answered = true;
    scheduleCurrent(isCorrect);
    state.scheduledThisTurn = true;

    for(var i=0;i<state.revealed.length;i++) state.revealed[i] = true;
    maskedWordEl.textContent = maskString(currentTargetString(w), state.revealed);

    feedback.classList.add('show');
    feedbackAnswer.textContent = displayAnswer;
    feedbackAnswer.classList.remove('hidden');
    if(isCorrect){
      feedback.classList.add('correct');
      feedback.classList.remove('incorrect');
      feedbackTitle.textContent = '✅ Correct';
    } else {
      feedback.classList.add('incorrect');
      feedback.classList.remove('correct');
      feedbackTitle.textContent = '❌ Correct answer';
    }
  }

  function giveHint(){
    var w = state.words[state.currentIndex];
    var target = currentTargetString(w);
    var hiddenPositions = [];
    for(var i=0;i<target.length;i++){
      if(LETTER_RE.test(target[i]) && !state.revealed[i]) hiddenPositions.push(i);
    }
    if(hiddenPositions.length === 0) return;
    var pick = hiddenPositions[Math.floor(Math.random()*hiddenPositions.length)];
    state.revealed[pick] = true;
    maskedWordEl.textContent = maskString(target, state.revealed);
  }

  checkBtn.addEventListener('click', checkAnswer);
  hintBtn.addEventListener('click', giveHint);
  nextBtn.addEventListener('click', nextWord);
  answerInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
      e.preventDefault();
      if(!state.answered) checkAnswer();
      else nextWord();
    }
  });

  loadFromSheet();

})();
</script>
</body>
