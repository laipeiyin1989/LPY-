<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Italian Trainer</title>

<style>

body{
    font-family:Arial,sans-serif;
    max-width:600px;
    margin:40px auto;
    padding:20px;
    background:#f6f6f6;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
    text-align:center;
}

#english{
    font-size:30px;
    font-weight:bold;
    text-align:center;
    margin-top:30px;
}

#masked{
    font-size:26px;
    text-align:center;
    margin:25px 0;
    letter-spacing:2px;
}

input{
    width:100%;
    padding:12px;
    font-size:20px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    margin-top:12px;
    font-size:18px;
    cursor:pointer;
}

#result{
    text-align:center;
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

#progress{
    text-align:center;
    color:gray;
}

</style>

</head>

<body>

<div class="card">

<h1>Italian Trainer</h1>

<input type="file" id="file" accept=".csv">

<div id="progress"></div>

<div id="english"></div>

<div id="masked"></div>

<input
id="answer"
placeholder="Type the Italian word">

<button id="checkBtn">Check</button>

<button id="hintBtn">Hint</button>

<button id="nextBtn">Next</button>

<div id="result"></div>

</div>

<script>

let vocab=[];

let deck=[];

let current=0;

let reveal=[];

let currentWord="";

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=[array[j],array[i]];

}

}

document.getElementById("file").addEventListener("change",function(e){

const file=e.target.files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=function(){

const lines=reader.result.trim().split(/\r?\n/);

vocab=[];

for(let i=1;i<lines.length;i++){

const cols=lines[i].split(",");

if(cols.length<2) continue;

vocab.push({

english:cols[0].trim(),

italian:cols[1].trim()

});

}

deck=[...vocab];

shuffle(deck);

current=0;

loadCard();

}

reader.readAsText(file);

});

function loadCard(){

if(deck.length===0) return;

if(current>=deck.length){

shuffle(deck);

current=0;

}

const item=deck[current];

currentWord=item.italian;

document.getElementById("english").textContent=item.english;

document.getElementById("progress").textContent=(current+1)+" / "+deck.length;

document.getElementById("answer").value="";

document.getElementById("result").textContent="";

maskWord();

}

function maskWord(){

const words=currentWord.split(" ");

let article="";

let noun="";

if(words.length>1){

article=words[0];

noun=words.slice(1).join(" ");

}else{

noun=currentWord;

}

reveal=[];

for(let i=0;i<noun.length;i++) reveal.push(false);

const letters=[...noun].filter(c=>c!=" ").length;

let revealCount=Math.max(1,Math.floor(letters*0.2));

while(reveal.filter(Boolean).length<revealCount){

const r=Math.floor(Math.random()*noun.length);

if(noun[r]!=" ")

reveal[r]=true;

}

drawMask(article,noun);

}

function drawMask(article,noun){

let output="";

for(let i=0;i<noun.length;i++){

if(noun[i]==" ")

output+=" ";

else

output+=reveal[i]?noun[i]:"*";

}

document.getElementById("masked").textContent=(article?article+" ":"")+output;

}

document.getElementById("hintBtn").onclick=function(){

const words=currentWord.split(" ");

let noun=words.length>1?words.slice(1).join(" "):currentWord;

const hidden=[];

for(let i=0;i<noun.length;i++){

if(noun[i]!=" "&&!reveal[i])

hidden.push(i);

}

if(hidden.length===0) return;

const pick=hidden[Math.floor(Math.random()*hidden.length)];

reveal[pick]=true;

drawMask(words[0],noun);

}

document.getElementById("checkBtn").onclick=function(){

const ans=document.getElementById("answer").value.trim().toLowerCase();

if(ans===currentWord.toLowerCase()){

document.getElementById("result").textContent="✅ Correct";

}else{

document.getElementById("result").textContent="❌ "+currentWord;

}

}

document.getElementById("nextBtn").onclick=function(){

current++;

loadCard();

}

document.getElementById("answer").addEventListener("keydown",function(e){

if(e.key==="Enter"){

document.getElementById("checkBtn").click();

}

});

</script>

</body>

</html>
