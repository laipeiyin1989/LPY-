<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Italian Trainer</title><style>body{font-family:Arial;padding:20px}button,input,select{font-size:18px;margin:6px;padding:8px}#word{font-size:32px;font-weight:bold;margin:20px 0}</style></head><body><h2>Italian Trainer</h2>
<input type=file id=file accept=.csv><button onclick="imp()">Import Vocabulary</button><br>
<select id=cat></select><div id=word></div><input id=ans placeholder='Answer'><br>
<button onclick='check()'>Check Answer</button><button onclick='hint()'>Hint</button><button onclick='nextW()'>Next</button><p id=msg></p>
<script>
let data=JSON.parse(localStorage.getItem('vocab')||'[]'),cur;
function save(){localStorage.setItem('vocab',JSON.stringify(data));loadCats();}
function imp(){let f=file.files[0];if(!f)return;let r=new FileReader();r.onload=e=>{let l=e.target.result.trim().split(/\r?\n/).slice(1);data=l.map(x=>{let a=x.split(',');return{c:a[0],i:a[1],e:a[2]}});save();nextW();};r.readAsText(f);}
function loadCats(){let s=cat;s.innerHTML='<option>All</option>';[...new Set(data.map(x=>x.c))].forEach(c=>s.innerHTML+=`<option>${c}</option>`);}
function mask(t){return t.replace(/[A-Za-zÀ-ÿ]/g,(m,i)=>Math.random()<0.45?'_':m);}
function nextW(){let arr=data.filter(x=>cat.value=='All'||x.c==cat.value);if(!arr.length){word.textContent='Import vocab';return;}cur=arr[Math.floor(Math.random()*arr.length)];word.textContent=mask(cur.i);msg.textContent='';ans.value='';}
function check(){let a=ans.value.trim().toLowerCase();let ok=cur.e.toLowerCase().split('|').includes(a);msg.textContent=ok?'Correct!':'Answer: '+cur.e;}
function hint(){word.textContent=cur.i;}
cat.onchange=nextW;loadCats();nextW();
</script></body></html>
